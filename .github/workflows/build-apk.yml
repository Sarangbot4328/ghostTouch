name: Build APK

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Verify signing secrets
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}
          SIGNING_PASSWORD: ${{ secrets.ANDROID_SIGNING_PASSWORD }}
        run: |
          if [ -z "$SIGNING_KEYSTORE_BASE64" ] || [ -z "$SIGNING_PASSWORD" ]; then
            echo "Android signing secrets are not configured."
            exit 1
          fi

      - name: Restore signing key
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}
        run: printf '%s' "$SIGNING_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/ghosttouch-signing.p12"

      - name: Detect signing key alias
        env:
          SIGNING_PASSWORD: ${{ secrets.ANDROID_SIGNING_PASSWORD }}
        run: |
          keytool_output="$(LC_ALL=C keytool -list -v \
            -keystore "$RUNNER_TEMP/ghosttouch-signing.p12" \
            -storetype PKCS12 \
            -storepass "$SIGNING_PASSWORD")"
          signing_alias="$(printf '%s\n' "$keytool_output" | awk -F': ' '/^Alias name: / { print $2; exit }')"

          if [ -z "$signing_alias" ]; then
            echo "Could not detect the signing key alias."
            exit 1
          fi

          echo "ANDROID_SIGNING_KEY_ALIAS=$signing_alias" >> "$GITHUB_ENV"

      - name: Build debug APK
        env:
          ANDROID_SIGNING_STORE_FILE: ${{ runner.temp }}/ghosttouch-signing.p12
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_PASSWORD }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_PASSWORD }}
        run: gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ghosttouch-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
